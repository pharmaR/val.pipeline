default:
  remote_only: [withr, VGAM, shinyBS, fitdistrplus, collapse, gamlss.dist, gss, segmented, RSiena, qtl, openxlsx2, BayesXsrc] # withr - crashes, VGAM 10h, shinyBS 5h, collapse 1.6h, fitdistrplus 1.7h, gamlss.dist 52m, gss 52m, segmented 45m, RSiena 1.6hr, qtl 22hr, openxlsx2 60m, BayesXsrc 45m,
  pass_primary: [logrx, admiral, ggsurvfit, sdtm.oak, cardinal, cards, admiralonco, tidytlg, pharmaversesdtm, pharmaverseadam, rlistings, sdtmchecks, metatools, cardx, admiraldev, admiralophtha, datacutr, admiralci, envsetup] # Pkgs that shouldn't be immediately filtered from (1) val_categorize() or (2) from primary metrics in val_decision(). Usually, these packages have low downloads, but we want these packages to recieve their full day in court & retrieve code coverage metrics.
  approved_pkgs: [
    tidyverse, ggplot2, dplyr, tidyr, readr, purrr, tibble, stringr, forcats, lubridate,
    DBI, haven, httr, readxl, googlesheets4, googledrive, rvest, jsonlite, xml2,
    hms, blob, dbplyr, dtplyr,
    magrittr, glue,
    readxl, vroom, 
    
    tidymodels, rsample, parsnip, recipes, workflows, tune, yardstick, broom, dials,
    
    devtools, lintr, pak, cli, roxygen2, testthat, usethis, pkgdown, httr2, rlang,
    xml2, progress, scales, here, R6, fs, remotes, covr, rcmdcheck,
    
    shiny, rmarkdown,
    
    gt
  ] # packages that have been approved manually outside of {val.pipeline} workflow
  decisions_lst: [Low, Medium, High]
  opt_repos: 
    CRAN: https://packagemanager.posit.co/cran/2026-06-21
    BioC: https://bioconductor.org/packages/3.22/bioc #https://packagemanager.posit.co/bioconductor/latest 
    
remote_reduce:
  inherits: default
  downloads_1yr:
    cond:
      # High: ~ 
      High: ~ is.na(.x) | .x < 80000
      Medium: ~ dplyr::between(.x, 80000, 240000)
      Low: ~ .x > 240000
    type: primary
    accept_cats: Low
    promote_min: ~ .x > 60000 # bare minimum needed for promo
    auto_accept: ~ .x > 1000000 # anything above this is gold & doesn't need all the rules
  reverse_dependencies:
    cond:
      # High: ~ is.na(.x)
      High: ~ .x < 2
      Medium: ~ dplyr::between(.x, 2, 10)
      Low: ~ .x > 10
    type: secondary
    accept_cats: [Low]
    auto_accept: ~ .x > 50 # anything above this is 'gold' & doesn't need to hit all the rules
  dependencies:
    cond:
      # High: ~ is.na(.x)
      High: ~ .x > 8
      Medium: ~ dplyr::between(.x, 4, 8)
      Low: ~ .x < 4
    type: secondary
    accept_cats: [Low, Medium]
  news_current:
    cond:
      # High: ~ is.na(.x)
      High: ~ .x != 1
      Low: ~ .x == 1
    type: secondary
    accept_cats: Low
  has_vignettes:
    cond:
      # High: ~ is.na(.x)
      High: ~ .x < 1
      Medium: ~ .x == 1
      Low: ~ .x > 1
    type: secondary
    accept_cats: Low
  has_source_control:
    cond:
      # High: ~ is.na(.x)
      High: ~ .x == 0
      Low: ~ .x > 0
    type: secondary
    accept_cats: Low
  has_website:
    cond:
      High: ~ .x == 0
      Low: ~ .x > 0
    type: secondary
    accept_cats: Low


decide:
  inherits: remote_reduce
  # downloads_1yr: # overwrites remote_reduce contraint!
  #   cond:
  #     High: ~ is.na(.x) | .x < 120000
  #     Medium: ~ dplyr::between(.x, 120000, 240000)
  #     Low: ~ .x > 240000
  #   type: secondary # only change! Leaving covr_coverage as the only primary
  #   accept_cats: Low
  #   promote_min: ~ .x > 80000
  #   auto_accept: ~ .x > 1000000
  covr_coverage:
    cond:
      High: ~ is.na(.x) | .x < 35
      Medium: ~ dplyr::between(.x, 35, 65)
      Low: ~ .x > 65
    type: primary
    accept_cats: Low
  r_cmd_check_errors: # Pointless as a primary check since CRAN insures no warnings / errors
    cond:
      High: ~ is.na(.x) | .x > 1
      Low: ~ .x == 0
    type: secondary
    accept_cats: Low
  r_cmd_check_warnings: # Pointless as a primary check since CRAN insures no warnings / errors
    cond:
      High: ~ is.na(.x) | .x > 1
      Low: ~ .x == 0
    type: secondary
    accept_cats: Low
  dependencies:
    cond:
      # High: ~ is.na(.x)
      High: ~ .x > 35
      Medium: ~ dplyr::between(.x, 25, 35)
      Low: ~ .x < 25
    type: secondary
    accept_cats: [Low, Medium]
  has_examples:
    cond:
      High: ~ is.na(.x) | .x < 1
      Medium: ~ dplyr::between(.x, 1, 40)
      Low: ~ .x > 40
    type: secondary
    accept_cats: [Low, Medium]
  export_help:
    cond:
      High: ~ is.na(.x) | .x < 1
      Medium: ~ dplyr::between(.x, 1, 40)
      Low: ~ .x > 40
    type: secondary
    accept_cats: [Low, Medium]


